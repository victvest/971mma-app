project_id = "971mma-app"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

# Skip storage during `supabase config push` — remote storage API no longer returns
# legacy `databasePoolMode`, which breaks CLI <=2.107 when diffing storage config.
# This does NOT disable hosted Storage; it only avoids syncing storage settings.
[storage]
enabled = false

# Hosted auth settings — pushed via `supabase config push`.
[auth]
enabled = true
site_url = "nine71mma://auth/callback"
additional_redirect_urls = [
  "nine71mma://**",
  "nine71mma://auth/callback",
  "https://app.971mma.com/auth/callback",
  "exp://**",
]
enable_signup = true
minimum_password_length = 6

[auth.rate_limit]
# Dev-friendly limits while testing signup / link flows.
email_sent = 100
sms_sent = 30
anonymous_users = 100
token_refresh = 500
sign_in_sign_ups = 500
token_verifications = 500

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 45

[functions.mb-health]
verify_jwt = true

[functions.mb-link]
verify_jwt = true

[functions.mb-link-manual]
